<!DOCTYPE html>
<!--
  Minimal Canvas2D reimplementation of the disk pattern, for environments
  without WebGL2 or for quickly visualizing arc-pattern.js in isolation.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>arc-pattern.js — Canvas2D demo</title>
  <style>
    body { margin: 0; background: #000; display: grid; place-items: center; height: 100vh; }
    canvas { border-radius: 50%; }
  </style>
</head>
<body>
  <canvas id="c" width="500" height="500"></canvas>
  <script type="module">
    import { sectorPeriodDeg } from '../src/js/arc-pattern.js';

    const arcCount = 3;
    const arcWidthDeg = 45;
    const rotationHz = 5;

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const radius = canvas.width / 2;

    let rotationDeg = 0;
    let last = performance.now();

    // Each sector is a filled arc rather than many thin stroked rays, so
    // there's no aliasing gap between rays at the outer radius and no
    // per-frame cost beyond arcCount draw calls.
    function draw() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#fff';
      const period = sectorPeriodDeg(arcCount);
      for (let i = 0; i < arcCount; i++) {
        const startDeg = i * period - rotationDeg;
        const endDeg = startDeg + arcWidthDeg;
        const startRad = (startDeg * Math.PI) / 180;
        const endRad = (endDeg * Math.PI) / 180;

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, startRad, endRad);
        ctx.closePath();
        ctx.fill();
      }
    }

    function frame(now) {
      const dt = (now - last) / 1000;
      last = now;
      rotationDeg = (rotationDeg + dt * rotationHz * 360) % 360;
      draw();
      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  </script>
</body>
</html>
